services:
  api:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - workflow_gateway_uploads:/var/lib/paper-service/workflow-gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "python -m app.cli.wait_for_db && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "python -m app.cli.wait_for_db && celery -A app.workers.celery_app.celery_app worker --loglevel=INFO"

  workflow_worker:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - workflow_gateway_uploads:/var/lib/paper-service/workflow-gateway
    command: >
      sh -c "python -m app.cli.wait_for_db &&
      celery -A app.workers.celery_app.celery_app worker
      --loglevel=INFO
      --queues=$${WORKFLOW_GATEWAY_QUEUE:-workflow_gateway}
      --concurrency=$${WORKFLOW_GATEWAY_WORKER_CONCURRENCY:-2}
      --hostname=workflow-worker@%h"
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app.celery_app inspect ping --timeout=5 >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: papers
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d papers"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
  redis_data:
  workflow_gateway_uploads:
