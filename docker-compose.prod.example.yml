services:
  api:
    build: .
    image: remotefileservice-api:latest
    restart: always
    env_file: .env
    ports:
      - "8000:8000"
    command: sh -c "python -m app.cli.wait_for_db && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build: .
    image: remotefileservice-api:latest
    env_file: .env
    restart: always
    command: sh -c "python -m app.cli.wait_for_db && celery -A app.workers.celery_app.celery_app worker --loglevel=INFO"

